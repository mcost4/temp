<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Monitor - Cotações em Tempo Real</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📈 Stock Monitor</h1>
            <p class="subtitle">Monitore cotações de ações em tempo real</p>
        </header>

        <div class="api-config">
            <input 
                type="text" 
                id="apiKey" 
                placeholder="Cole sua API Key da Alpha Vantage (opcional)"
                class="api-input"
            >
            <button onclick="saveApiKey()" class="btn-save">Salvar</button>
            <a href="https://www.alphavantage.co/api/" target="_blank" class="btn-help">Obter API Key</a>
        </div>

        <div class="controls">
            <button onclick="refreshData()" class="btn-refresh">🔄 Atualizar Agora</button>
            <label class="auto-refresh-label">
                <input type="checkbox" id="autoRefresh" onchange="toggleAutoRefresh()">
                Auto-atualizar (60s)
            </label>
        </div>

        <div class="status-info">
            <p id="lastUpdate">Carregando...</p>
            <p id="dataStatus" class="status-mock">Usando dados de exemplo</p>
        </div>

        <div id="stocksContainer" class="stocks-grid">
            <div class="loading">⏳ Carregando dados...</div>
        </div>

        <footer class="footer">
            <p>Dados fornecidos por Alpha Vantage API | Atualizado em tempo real</p>
        </footer>
    </div>

    <script src="src/app.js"></script>
</body>
</html>
